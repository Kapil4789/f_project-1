name: CI-CD -> EC2 Rolling update via ASG

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REPO: 680871073533.dkr.ecr.us-east-1.amazonaws.com/flask-app
  LT_ID: lt-062d695e7b63ebec3
  ASG_NAME: flask-app-asg


jobs:
  build_and_push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      new-image-tag: ${{ steps.tag.outputs.new-image-tag }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          region: ${{ env.AWS_REGION }}

      - name: Determine image tag
        id: tag
        run: |
          NEW_TAG=$(echo $GITHUB_SHA | head -c7)
          echo "new_image_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "new_image_tag=$NEW_TAG" >> $GITHUB_ENV

      - name: Build tag, and push to ECR
        run: |
          echo "Building Docker image..."
          echo "  Repository: $ECR_REPO"
          echo "  Tag: $new_image_tag"
          
          docker build -t $ECR_REPO:$new_image_tag . || {
            echo "ERROR: Failed to build Docker image"
            exit 1
          }
          
          echo "✓ Image built successfully"
          echo ""
          echo "Pushing image to ECR (with retries)..."
          
          MAX_PUSH_RETRIES=3
          PUSH_RETRY_DELAY=10
          
          for attempt in $(seq 1 $MAX_PUSH_RETRIES); do
            echo "  Attempt $attempt of $MAX_PUSH_RETRIES..."
            if docker push $ECR_REPO:$new_image_tag; then
              echo "✓ Image pushed successfully"
              exit 0
            elif [ $attempt -lt $MAX_PUSH_RETRIES ]; then
              echo "  Failed to push. Waiting ${PUSH_RETRY_DELAY}s before retry..."
              sleep $PUSH_RETRY_DELAY
            else
              echo "ERROR: Failed to push image after $MAX_PUSH_RETRIES attempts"
              exit 1
            fi
          done
  update_launch_template:
    name: Update ASG Launch Template
    runs-on: ubuntu-latest
    needs: build_and_push
    environment: prod
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.new-image-tag }}
    outputs:
      lt_version: ${{ steps.create_lt_version.outputs.lt_version }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render new user-data with updated image tag
        id: userdata
        run: |
          TAG="${{ env.IMAGE_TAG }}"
          AWS_REGION="${{ env.AWS_REGION }}"
          ECR_REPO="${{ env.ECR_REPO }}"
          
          cat <<'EOF' > new_user_data.txt
          #!/bin/bash
          set -e
          
          # Setup logging
          LOG_FILE="/var/log/user-data.log"
          exec > >(tee -a $LOG_FILE)
          exec 2>&1
          
          echo "========================================="
          echo "User Data Script Started: $(date)"
          echo "========================================="
          
          TAG="TAG_PLACEHOLDER"
          AWS_REGION="AWS_REGION_PLACEHOLDER"
          ECR_REPO="ECR_REPO_PLACEHOLDER"
          
          echo "Configuration:"
          echo "  TAG: $TAG"
          echo "  AWS_REGION: $AWS_REGION"
          echo "  ECR_REPO: $ECR_REPO"
          
          # Update package lists
          echo ""
          echo "Step 1: Updating package lists..."
          apt-get update -y || { echo "Failed to update packages"; exit 1; }
          
          # Install dependencies
          echo ""
          echo "Step 2: Installing dependencies (docker.io, unzip, curl)..."
          apt-get install -y docker.io unzip curl || { echo "Failed to install dependencies"; exit 1; }
          
          # Start and enable Docker
          echo ""
          echo "Step 3: Starting Docker service..."
          systemctl start docker || { echo "Failed to start docker"; exit 1; }
          systemctl enable docker || { echo "Failed to enable docker"; exit 1; }
          sleep 2
          
          # Verify Docker is running
          echo "Docker status:"
          systemctl status docker
          
          # Download and install AWS CLI v2 (not v1 from apt)
          echo ""
          echo "Step 4: Installing AWS CLI v2..."
          cd /tmp
          curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip" || { echo "Failed to download AWS CLI"; exit 1; }
          unzip -q awscliv2.zip
          ./aws/install || { echo "Failed to install AWS CLI"; exit 1; }
          aws --version
          
          # Login to ECR
          echo ""
          echo "Step 5: Logging into ECR..."
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPO || { echo "Failed to login to ECR. Check IAM role permissions."; exit 1; }
          
          # Pull Docker image with retries
          echo ""
          echo "Step 6: Pulling Docker image (with retries)..."
          MAX_PULL_RETRIES=3
          PULL_RETRY_DELAY=5
          for attempt in $(seq 1 $MAX_PULL_RETRIES); do
            echo "  Attempt $attempt of $MAX_PULL_RETRIES..."
            if docker pull $ECR_REPO:$TAG; then
              echo "  Successfully pulled image"
              break
            elif [ $attempt -lt $MAX_PULL_RETRIES ]; then
              echo "  Failed to pull. Waiting ${PULL_RETRY_DELAY}s before retry..."
              sleep $PULL_RETRY_DELAY
            else
              echo "Failed to pull image after $MAX_PULL_RETRIES attempts"
              exit 1
            fi
          done
          
          # Remove old container if exists
          echo ""
          echo "Step 7: Cleaning up old container..."
          docker rm -f flask-app || true
          
          # Run Docker container
          echo ""
          echo "Step 8: Starting Flask container..."
          docker run -d --name flask-app -p 80:5000 $ECR_REPO:$TAG || { echo "Failed to run container"; exit 1; }
          sleep 3
          
          # Verify container is running
          echo ""
          echo "Step 9: Verifying container status..."
          docker ps -a
          CONTAINER_STATUS=$(docker inspect -f '{{.State.Status}}' flask-app 2>/dev/null || echo "not found")
          echo "Flask container status: $CONTAINER_STATUS"
          if [ "$CONTAINER_STATUS" != "running" ]; then
            echo "WARNING: Container is not running. Checking logs..."
            docker logs flask-app || true
            exit 1
          fi
          
          docker logs flask-app || true
          
          echo ""
          echo "========================================="
          echo "User Data Script Completed: $(date)"
          echo "========================================="
          EOF
          
          # Replace placeholders with actual values
          sed -i "s|TAG_PLACEHOLDER|$TAG|g" new_user_data.txt
          sed -i "s|AWS_REGION_PLACEHOLDER|$AWS_REGION|g" new_user_data.txt
          sed -i "s|ECR_REPO_PLACEHOLDER|$ECR_REPO|g" new_user_data.txt
          
          # Output the final user-data
          echo "=== Final user-data script ==="
          cat new_user_data.txt
          echo "=== End user-data script ==="

      - name: Create new launch template version
        id: create_lt_version
        run: |
          AWS_REGION="${{ env.AWS_REGION }}"
          ECR_REPO="${{ env.ECR_REPO }}"
          LT_ID="${{ env.LT_ID }}"
          TAG="${{ env.IMAGE_TAG }}"
          
          echo "Creating launch template version:"
          echo "  LT_ID: $LT_ID"
          echo "  TAG: $TAG"
          echo "  Description: Deploy $TAG"
          
          # Validate LT_ID is not empty
          if [ -z "$LT_ID" ]; then
            echo "ERROR: LT_ID is empty"
            exit 1
          fi
          
          # Read and base64 encode the user-data file
          if [ ! -f new_user_data.txt ]; then
            echo "ERROR: new_user_data.txt not found"
            exit 1
          fi
          
          USER_DATA_B64=$(base64 -w 0 new_user_data.txt)
          USER_DATA_SIZE=${#USER_DATA_B64}
          echo "User-data encoded size: $USER_DATA_SIZE bytes"
          
          # Verify base64 is not empty
          if [ -z "$USER_DATA_B64" ]; then
            echo "ERROR: Failed to base64 encode user-data"
            exit 1
          fi
          
          # Create the launch template data
          cat > launch_template_data.json <<EOF
          {
            "UserData": "$USER_DATA_B64"
          }
          EOF
          
          echo "=== Launch Template Data (first 200 chars) ==="
          head -c 200 launch_template_data.json
          echo ""
          echo "=== End Launch Template Data Preview ==="
          
          # Create launch template version
          VERSION_NUMBER=$(aws ec2 create-launch-template-version \
            --launch-template-id $LT_ID \
            --version-description "Deploy $TAG" \
            --source-version 1 \
            --launch-template-data file://launch_template_data.json \
            --query "LaunchTemplateVersion.VersionNumber" \
            --output text 2>&1)
          
          # Check if version number is valid
          if [ -z "$VERSION_NUMBER" ] || [ "$VERSION_NUMBER" = "None" ] || echo "$VERSION_NUMBER" | grep -q "error\|Error"; then
            echo "ERROR: Failed to create launch template version"
            echo "Response: $VERSION_NUMBER"
            exit 1
          fi
          
          echo "lt_version=$VERSION_NUMBER" >> $GITHUB_OUTPUT
          echo ""
          echo "✓ Created launch template version: $VERSION_NUMBER"
          echo "  Description: Deploy $TAG"
  trigger_asg_refresh:
    name: Trigger ASG Group Refresh
    runs-on: ubuntu-latest
    needs: [update_launch_template, build_and_push]
    environment: prod
    env:
      IMG_TAG: ${{ needs.build_and_push.outputs.new-image-tag }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: wait briefly before triggering ASG refresh
        run: sleep 10
      
      - name: Trigger ASG instance refresh
        run: |
          LT_VERSION="${{ needs.update_launch_template.outputs.lt_version }}"
          
          # Validate critical variables
          if [ -z "$LT_VERSION" ] || [ "$LT_VERSION" = "None" ]; then
            echo "ERROR: Invalid launch template version: $LT_VERSION"
            echo "LT_VERSION must be a numeric value"
            exit 1
          fi
          
          echo "Using launch template version: $LT_VERSION"
          echo "ASG Name: $ASG_NAME"
          echo "Region: $AWS_REGION"
          
          MAX_RETRIES=5
          RETRY_DELAY=30
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo ""
            echo "Attempt $i of $MAX_RETRIES: Checking for in-progress refresh..."
            
            # Check if a refresh is already in progress
            REFRESH_STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name $ASG_NAME \
              --region $AWS_REGION \
              --query "InstanceRefreshes[0].Status" \
              --output text 2>/dev/null || echo "None")
            
            echo "Current refresh status: $REFRESH_STATUS"
            
            if [ "$REFRESH_STATUS" = "InProgress" ] || [ "$REFRESH_STATUS" = "Pending" ]; then
              if [ $i -lt $MAX_RETRIES ]; then
                echo "Instance refresh already in progress. Waiting ${RETRY_DELAY}s before retry..."
                sleep $RETRY_DELAY
                continue
              else
                echo "Max retries reached. Instance refresh still in progress."
                echo "Skipping new refresh to avoid blocking. You can trigger manually after current refresh completes."
                exit 0
              fi
            fi
            
            echo ""
            echo "No refresh in progress. Triggering new instance refresh..."
            aws autoscaling start-instance-refresh \
              --auto-scaling-group-name $ASG_NAME \
              --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}' \
              --desired-configuration "{\"LaunchTemplate\": {\"LaunchTemplateId\": \"$LT_ID\", \"Version\": \"$LT_VERSION\"}}" \
              --region $AWS_REGION
            
            REFRESH_ID=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name $ASG_NAME \
              --region $AWS_REGION \
              --query "InstanceRefreshes[0].InstanceRefreshId" \
              --output text)
            
            echo "Instance refresh triggered successfully!"
            echo "Refresh ID: $REFRESH_ID"
            echo ""
            echo "Monitor refresh progress:"
            echo "  aws autoscaling describe-instance-refreshes --auto-scaling-group-name $ASG_NAME --region $AWS_REGION"
            
            exit 0
          done
          
          echo "ERROR: Failed to trigger instance refresh after $MAX_RETRIES attempts"
          exit 1