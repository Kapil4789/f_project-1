name: CI-CD -> EC2 Rolling update via ASG

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REPO: 680871073533.dkr.ecr.us-east-1.amazonaws.com/flask-app
  LT_ID: lt-062d695e7b63ebec3
  ASG_NAME: flask-app-asg


jobs:
  build_and_push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      new-image-tag: ${{ steps.tag.outputs.new-image-tag }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          region: ${{ env.AWS_REGION }}

      - name: Determine image tag
        id: tag
        run: |
          NEW_TAG=$(echo $GITHUB_SHA | head -c7)
          echo "new_image_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "new_image_tag=$NEW_TAG" >> $GITHUB_ENV

      - name: Build tag, and push to ECR
        run: |
          docker build -t $ECR_REPO:$new_image_tag .
          docker push $ECR_REPO:$new_image_tag
  update_launch_template:
    name: Update ASG Launch Template
    runs-on: ubuntu-latest
    needs: build_and_push
    environment: prod
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.new-image-tag }}
    outputs:
      lt_version: ${{ steps.create_lt_version.outputs.lt_version }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render new user-data with updated image tag
        id: userdata
        run: |
          TAG="${{ env.IMAGE_TAG }}"
          AWS_REGION="${{ env.AWS_REGION }}"
          ECR_REPO="${{ env.ECR_REPO }}"
          
          cat <<'EOF' > new_user_data.txt
          #!/bin/bash
          set -e
          
          TAG="TAG_PLACEHOLDER"
          AWS_REGION="AWS_REGION_PLACEHOLDER"
          ECR_REPO="ECR_REPO_PLACEHOLDER"
          
          apt-get update -y
          apt-get install -y docker.io unzip
          systemctl start docker
          usermod -aG docker ubuntu
          
          cd /tmp
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install
          
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPO
          docker pull $ECR_REPO:$TAG
          docker rm -f flask-app || true
          docker run -d --name flask-app -p 80:5000 $ECR_REPO:$TAG
          EOF
          
          # Replace placeholders with actual values
          sed -i "s|TAG_PLACEHOLDER|$TAG|g" new_user_data.txt
          sed -i "s|AWS_REGION_PLACEHOLDER|$AWS_REGION|g" new_user_data.txt
          sed -i "s|ECR_REPO_PLACEHOLDER|$ECR_REPO|g" new_user_data.txt
          
          # Output the final user-data
          echo "=== Final user-data script ==="
          cat new_user_data.txt
          echo "=== End user-data script ==="

      - name: Create new launch template version
        id: create_lt_version
        run: |
          AWS_REGION="${{ env.AWS_REGION }}"
          ECR_REPO="${{ env.ECR_REPO }}"
          LT_ID="${{ env.LT_ID }}"
          TAG="${{ env.IMAGE_TAG }}"
          
          # Read the user-data file
          USER_DATA_B64=$(base64 -w 0 new_user_data.txt)
          
          VERSION_NUMBER=$(aws ec2 create-launch-template-version \
            --launch-template-id $LT_ID \
            --version-description "Deploy $TAG" \
            --source-version 1 \
            --launch-template-data '{"UserData":"'$USER_DATA_B64'"}' \
            --query "LaunchTemplateVersion.VersionNumber" \
            --output text)
          
          echo "lt_version=$VERSION_NUMBER" >> $GITHUB_OUTPUT
          echo "Created launch template version: $VERSION_NUMBER"
  trigger_asg_refresh:
    name: Trigger ASG Group Refresh
    runs-on: ubuntu-latest
    needs: [update_launch_template, build_and_push]
    environment: prod
    env:
      IMG_TAG: ${{ needs.build_and_push.outputs.new-image-tag }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: wait briefly before triggering ASG refresh
        run: sleep 10
      
      - name: Trigger ASG instance refresh
        run: |
          LT_VERSION="${{ needs.update_launch_template.outputs.lt_version }}"
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $ASG_NAME \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}' \
            --desired-configuration "{\"LaunchTemplate\": {\"LaunchTemplateId\": \"$LT_ID\", \"Version\": \"$LT_VERSION\"}}" \
            --region $AWS_REGION