name: CI-CD -> EC2 Rolling update via ASG

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REPO: 680871073533.dkr.ecr.us-east-1.amazonaws.com/flask-app
  LT_ID: lt-062d695e7b63ebec3
  ASG_NAME: flask-app-asg


jobs:
  build_and_push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          region: ${{ env.AWS_REGION }}

      - name: Build, tag, and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: flask-app
        run: |
          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
 
          echo "Building image: $IMAGE_URI"
          docker build -t "$IMAGE_URI" .
 
          echo "Pushing image to ECR with retries..."
          n=0
          until [ "$n" -ge 3 ]; do
            docker push "$IMAGE_URI" && break
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "Failed to push"; exit 1; fi
            echo "Push failed. Retrying in 10s... ($n/3)"
            sleep 10
          done
 
          # Also tag as latest
          docker tag "$IMAGE_URI" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          n=0
          until [ "$n" -ge 3 ]; do
            docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest" && break
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "Failed to push latest"; exit 1; fi
            echo "Push latest failed. Retrying in 10s... ($n/3)"
            sleep 10
          done
 
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "✅ Image pushed: $IMAGE_URI"

  update_launch_template:
    name: Update Launch Template
    runs-on: ubuntu-latest
    needs: build_and_push
 
    outputs:
      latest_version: ${{ steps.update.outputs.latest_version }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create new Launch Template version
        id: update
        env:
          IMAGE_URI: ${{ needs.build_and_push.outputs.image_uri }}
        run: |
          echo "Creating new Launch Template version for $LT_ID"
 
          # Build user-data script that pulls the new image on instance boot
          USER_DATA=$(cat <<EOF | base64 -w 0
          #!/bin/bash
          set -e
          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1
          
          echo "Starting application deployment..."
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
              \$(echo "$IMAGE_URI" | cut -d'/' -f1)
              
          echo "Pulling Docker image..."
          n=0
          until [ "\$n" -ge 3 ]; do
            docker pull $IMAGE_URI && break
            n=\$((n+1))
            if [ "\$n" -ge 3 ]; then echo "Failed to pull image"; exit 1; fi
            echo "Pull failed. Retrying in 5s... (\$n/3)"
            sleep 5
          done
          
          docker stop app 2>/dev/null || true
          docker rm   app 2>/dev/null || true
          docker run -d --name app --restart unless-stopped -p 80:5000 $IMAGE_URI
          
          sleep 5
          if [ "\$(docker inspect -f '{{.State.Running}}' app)" != "true" ]; then
            echo "Docker container failed to start. Logs:"
            docker logs app
            exit 1
          fi
          echo "Application started successfully."
          EOF
          )
 
          # Create a new version of the Launch Template
          NEW_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-id "$LT_ID" \
            --source-version '$Latest' \
            --launch-template-data "{\"UserData\":\"$USER_DATA\"}" \
            --query 'LaunchTemplateVersion.VersionNumber' \
            --output text)

          if ! [[ "$NEW_VERSION" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Invalid launch template version: $NEW_VERSION"
            echo "LT_VERSION must be a numeric value"
            exit 1
          fi
 
          echo "New Launch Template version: $NEW_VERSION"
 
          # Set it as the default version
          aws ec2 modify-launch-template \
            --launch-template-id "$LT_ID" \
            --default-version "$NEW_VERSION"
 
          echo "latest_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Launch Template updated to version $NEW_VERSION"
  trigger_asg_refresh:
    name: Trigger ASG Instance Refresh
    runs-on: ubuntu-latest
    needs: update_launch_template

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start Instance Refresh
        id: refresh
        run: |
          echo "Checking for in-progress instance refreshes..."
          IN_PROGRESS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG_NAME" \
            --query 'InstanceRefreshes[?Status==`InProgress` || Status==`Pending`].InstanceRefreshId' \
            --output text)
          
          if [ -n "$IN_PROGRESS" ]; then
            echo "ERROR: An instance refresh ($IN_PROGRESS) is already in progress. Blocking concurrent updates."
            exit 1
          fi

          echo "Starting instance refresh for ASG: $ASG_NAME"
 
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --strategy Rolling \
            --preferences '{
              "MinHealthyPercentage": 90,
              "InstanceWarmup": 120,
              "CheckpointPercentages": [50, 100],
              "CheckpointDelay": 60
            }' \
            --query 'InstanceRefreshId' \
            --output text)
 
          echo "refresh_id=$REFRESH_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Instance refresh started: $REFRESH_ID"
 
      - name: Wait for Instance Refresh to complete
        run: |
          REFRESH_ID="${{ steps.refresh.outputs.refresh_id }}"
          echo "Polling refresh status for ID: $REFRESH_ID"
 
          for i in $(seq 1 40); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
 
            echo "[$i/40] Status: $STATUS"
 
            case "$STATUS" in
              Successful)
                echo "✅ Instance refresh completed successfully."
                exit 0
                ;;
              Failed|Cancelled|RollbackFailed)
                echo "❌ Instance refresh ended with status: $STATUS"
                exit 1
                ;;
              *)
                echo "⏳ Still in progress... waiting 30s"
                sleep 30
                ;;
            esac
          done
 
          echo "⚠️ Timed out waiting for instance refresh."
          exit 1
 